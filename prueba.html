<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Descargador Pro</title>
  <style>
    body { background:#121212; color:white; font-family:sans-serif; text-align:center; padding:50px; }
    .container { border:2px solid #1DB954; padding:30px; border-radius:15px; background:#181818; display:inline-block; }
    input { width:320px; padding:12px; border-radius:8px; border:none; margin-bottom:10px; }
    button { background:#1DB954; color:white; border:none; padding:12px 30px; border-radius:8px; cursor:pointer; font-weight:bold; }
    #status { margin-top:20px; font-weight:bold; color:#1DB954; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Descargador Pro</h1>
    <input type="text" id="link" placeholder="Pega link de playlist YouTube/Spotify">
    <br><br>
    <button onclick="procesar()">¡PROCESAR!</button>
    <div id="status">Listo</div>
  </div>

  <script>
    function procesar() {
      const url = document.getElementById('link').value.trim();
      const status = document.getElementById('status');
      if (!url) return alert('Pega un link');

      status.textContent = '⏳ Descargando...';

      const ev = new EventSource(`/playlist-progress?url=${encodeURIComponent(url)}`);
      ev.onmessage = e => {
        const data = JSON.parse(e.data);
        status.textContent = data.status;

        if (data.status === 'Completado') {
          ev.close();
          status.textContent = '✅ Descargando ZIP...';
          window.location.href = `/get-zip?file=${data.file}`;
        }
      };
    }
  </script>
</body>
</html>
