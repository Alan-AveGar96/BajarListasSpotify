<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Descargador Pro</title>
    <style>
        body { background: #121212; color: white; font-family: sans-serif; text-align: center; padding-top: 50px; }
        .container { border: 2px solid #1DB954; padding: 30px; border-radius: 15px; display: inline-block; background: #181818; }
        input { padding: 10px; width: 300px; border-radius: 5px; border: none; }
        button { padding: 10px 20px; background: #1DB954; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        #status { margin-top: 20px; color: #1DB954; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Descargador Pro</h1>
        <input type="text" id="link" placeholder="Pega el link aquí">
        <button onclick="procesar()">¡PROCESAR!</button>
        <div id="status">Listo para descargar</div>
    </div>

    <script>
        const RAILWAY_URL = "https://bajarlistasspotify-production.up.railway.app";

        async function procesar() {
            const url = document.getElementById('link').value;
            const status = document.getElementById('status');
            status.innerText = "Procesando en la nube...";

            try {
                const res = await fetch(`${RAILWAY_URL}/download`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ url })
                });
                const data = await res.json();
                status.innerText = res.ok ? "¡Éxito! Archivo procesado." : "Error: " + data.error;
            } catch (e) {
                status.innerText = "Error de conexión. Revisa los logs.";
            }
        }
    </script>
</body>
</html>
