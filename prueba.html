<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Descargador Pro</title>
    <style>
        body { background: #121212; color: white; font-family: sans-serif; text-align: center; padding-top: 50px; }
        .box { border: 2px solid #1DB954; padding: 30px; display: inline-block; border-radius: 10px; background: #181818; }
        input { padding: 12px; width: 350px; border-radius: 5px; border: none; margin-bottom: 10px; }
        button { padding: 12px 25px; background: #1DB954; color: white; border: none; cursor: pointer; border-radius: 5px; font-weight: bold; }
        #status { margin-top: 20px; color: #1DB954; font-weight: bold; font-size: 1.1em; }
    </style>
</head>
<body>
    <div class="box">
        <h1>Descargador Pro</h1>
        <input type="text" id="link" placeholder="Pega link de Spotify o YouTube">
        <button onclick="procesar()">¡PROCESAR!</button>
        <div id="status">Esperando link...</div>
    </div>

    <script>
        // URL de tu servicio en Railway
        const RAILWAY_URL = "https://bajarlistasspotify-production.up.railway.app";

        function procesar() {
            const url = document.getElementById('link').value;
            const status = document.getElementById('status');
            if(!url) return alert("Por favor, pega un link válido.");
            
            status.innerText = "Conectando con el servidor en la nube...";
            
            const ev = new EventSource(`${RAILWAY_URL}/playlist-progress?url=${encodeURIComponent(url)}`);
            
            ev.onmessage = (e) => {
                const data = JSON.parse(e.data);
                status.innerText = data.status;
                
                if(data.status === "Completado") {
                    ev.close();
                    status.innerText = "¡Descarga lista! Iniciando transferencia...";
                    window.location.href = `${RAILWAY_URL}/get-zip?file=${data.file}`;
                }
            };

            ev.onerror = (err) => {
                console.error("Error:", err);
                status.innerText = "Error: No se pudo conectar. Verifica los logs de Railway.";
                ev.close();
            };
        }
    </script>
</body>
</html>
