<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Descargador Pro</title>
  <style>
    body { background: #121212; color: white; font-family: sans-serif; text-align: center; padding-top: 50px; }
    .container { border: 2px solid #1DB954; padding: 30px; border-radius: 15px; display: inline-block; background: #181818; min-width: 400px; }
    input { padding: 10px; width: 300px; border-radius: 5px; border: none; }
    button { padding: 10px 20px; background: #1DB954; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; margin-top: 10px; }
    #status { margin-top: 20px; color: #1DB954; font-weight: bold; }
    #progress { margin-top: 10px; color: #aaa; font-size: 14px; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Descargador Pro</h1>
    <input type="text" id="link" placeholder="Pega el link de Spotify o YouTube">
    <br>
    <button onclick="procesar()">¡PROCESAR!</button>
    <div id="status">Listo para descargar</div>
    <div id="progress"></div>
  </div>

  <script>
    function procesar() {
      const url = document.getElementById('link').value.trim();
      const status = document.getElementById('status');
      const progress = document.getElementById('progress');

      if (!url) return alert("Pega un link primero");

      status.innerText = "Conectando con el servidor...";
      progress.innerText = "";

      // ✅ Rutas relativas — funciona tanto en Railway como en localhost
      const ev = new EventSource(`/playlist-progress?url=${encodeURIComponent(url)}`);

      ev.onmessage = (e) => {
        const data = JSON.parse(e.data);
        status.innerText = data.status;

        if (data.current && data.total) {
          progress.innerText = `Canción ${data.current} de ${data.total}`;
        }

        if (data.status === "Completado") {
          ev.close();
          status.innerText = "✅ ¡Listo! Iniciando descarga del ZIP...";
          progress.innerText = "";
          window.location.href = `/get-zip?file=${data.file}`;
        }
      };

      ev.onerror = () => {
        status.innerText = "🚫 Error de conexión. Revisa los logs de Railway.";
        ev.close();
      };
    }
  </script>
</body>
</html>
